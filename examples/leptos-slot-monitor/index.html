<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>spume × leptos — slot monitor</title>
    <link data-trunk rel="rust" />
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        font-family: system-ui, -apple-system, sans-serif;
        background: #0a0a0a; color: #ededed;
      }
      main { padding: 2rem; }
      h1 {
        font-weight: 300; letter-spacing: 0.05em;
        margin: 0 0 1.5rem; font-size: 1.5rem;
      }
      .card {
        background: #161616; border: 1px solid #2a2a2a;
        border-radius: 12px; padding: 0.5rem 1.5rem; min-width: 360px;
      }
      .row {
        display: flex; justify-content: space-between; gap: 2rem;
        padding: 0.75rem 0;
      }
      .row + .row { border-top: 1px solid #2a2a2a; }
      .label {
        color: #888; text-transform: lowercase;
        letter-spacing: 0.05em; font-size: 0.85rem;
      }
      .value { color: #ededed; }
      .mono { font-family: ui-monospace, SFMono-Regular, monospace; }
    </style>
</head>

</html>
